name: Test increment-version-file-action

on:
  pull_request:
    paths:
      - "actions/utils/increment-version-file-action/**"
      - "packages/utils/increment-version-file-action/**"
      - "packages/toolkit/**"
  push:
    branches: [main]
    paths:
      - "actions/utils/increment-version-file-action/**"
      - "packages/utils/increment-version-file-action/**"
      - "packages/toolkit/**"
  workflow_dispatch:

jobs:
  test-default-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure git user
        run: |
          git config --global user.email "test@example.com"
          git config --global user.name "Test User"
      - name: Create test repo with bare remote
        run: |
          git init /tmp/test-repo
          cd /tmp/test-repo
          git commit --allow-empty -m "initial commit"
          git clone --bare /tmp/test-repo /tmp/test-remote.git
          git remote add origin /tmp/test-remote.git
          git push -u origin HEAD
      - name: Create version file and initial commit
        run: |
          cd /tmp/test-repo
          echo "1.0.0" > VERSION
          git add VERSION
          git commit -m "Add VERSION file"
          git push origin HEAD
      - name: Run increment-version-file-action
        uses: ./actions/utils/increment-version-file-action
        with:
          activeEvents: "pull_request push workflow_dispatch"
          authorEmail: "test@example.com"
          authorName: "Test User"
          commitMessage: "test: increment version"
          repoPath: "/tmp/test-repo"
          versionFilePath: "VERSION"
          versionFormat: "default"
      - name: Verify version was incremented
        run: |
          NEW_VERSION=$(cat /tmp/test-repo/VERSION)
          echo "New version: ${NEW_VERSION}"
          test "$NEW_VERSION" = "1.0.1-alpha-000"

  test-python-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure git user
        run: |
          git config --global user.email "test@example.com"
          git config --global user.name "Test User"
      - name: Create test repo with bare remote
        run: |
          git init /tmp/test-repo
          cd /tmp/test-repo
          git commit --allow-empty -m "initial commit"
          git clone --bare /tmp/test-repo /tmp/test-remote.git
          git remote add origin /tmp/test-remote.git
          git push -u origin HEAD
      - name: Create version file and initial commit
        run: |
          cd /tmp/test-repo
          echo "2.3.4" > VERSION
          git add VERSION
          git commit -m "Add VERSION file"
          git push origin HEAD
      - name: Run increment-version-file-action (python format)
        uses: ./actions/utils/increment-version-file-action
        with:
          activeEvents: "pull_request push workflow_dispatch"
          authorEmail: "test@example.com"
          authorName: "Test User"
          commitMessage: "test: increment python version"
          repoPath: "/tmp/test-repo"
          versionFilePath: "VERSION"
          versionFormat: "python"
      - name: Verify version was incremented
        run: |
          NEW_VERSION=$(cat /tmp/test-repo/VERSION)
          echo "New version: ${NEW_VERSION}"
          test "$NEW_VERSION" = "2.3.5a0"
