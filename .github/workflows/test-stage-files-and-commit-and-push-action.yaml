name: Test stage-files-and-commit-and-push-action

on:
  pull_request:
    paths:
      - "actions/git/stage-files-and-commit-and-push-action/**"
      - "packages/git/stage-files-and-commit-and-push-action/**"
      - "packages/toolkit/**"
  push:
    branches: [main]
    paths:
      - "actions/git/stage-files-and-commit-and-push-action/**"
      - "packages/git/stage-files-and-commit-and-push-action/**"
      - "packages/toolkit/**"
  workflow_dispatch:

jobs:
  test-commit-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure git user
        run: |
          git config --global user.email "test@example.com"
          git config --global user.name "Test User"
      - name: Create test repo with bare remote
        run: |
          git init /tmp/test-repo
          cd /tmp/test-repo
          git commit --allow-empty -m "initial commit"
          git clone --bare /tmp/test-repo /tmp/test-remote.git
          git remote add origin /tmp/test-remote.git
          git push -u origin HEAD
      - name: Create test file
        run: echo "push test content" > /tmp/test-repo/test-push.txt
      - name: Run stage-files-and-commit-and-push-action
        uses: ./actions/git/stage-files-and-commit-and-push-action
        with:
          activeEvents: "pull_request push workflow_dispatch"
          authorEmail: "test@example.com"
          authorName: "Test User"
          commitMessage: "test: stage, commit, and push"
          repoPath: "/tmp/test-repo"
          requiredFilePaths: "test-push.txt"
      - name: Verify commit was created and pushed
        run: |
          cd /tmp/test-repo
          LAST_MESSAGE=$(git log -1 --pretty=%s)
          echo "Last commit message: ${LAST_MESSAGE}"
          test "$LAST_MESSAGE" = "test: stage, commit, and push"

          LOCAL_SHA=$(git rev-parse HEAD)
          REMOTE_SHA=$(git ls-remote /tmp/test-remote.git HEAD | cut -f1)
          echo "Local SHA: ${LOCAL_SHA}"
          echo "Remote SHA: ${REMOTE_SHA}"
          test "$LOCAL_SHA" = "$REMOTE_SHA"
